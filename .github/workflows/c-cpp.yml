name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: install dependencies
      run: sudo apt-get update && sudo apt-get install -y tcl-dev tk-dev pkg-config
    - name: configure
      run: ./configure
    - name: make
      run: make
    - name: make test
      run: make test
